<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{{ status_code }} · {{ title }} · SoftBakery</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous" />
		<style>
			:root {
				--sb-primary: #7b1e3a;
				--sb-bg: #f8f1ed;
				--sb-text: #2f2a28;
			}

			body {
				background: linear-gradient(180deg, #fffaf8 0%, var(--sb-bg) 100%);
				color: var(--sb-text);
				min-height: 100vh;
			}

			.error-shell {
				max-width: 680px;
				margin: 7vh auto;
			}

			.error-card {
				border: 0;
				border-radius: 20px;
				box-shadow: 0 16px 40px rgba(35, 18, 20, 0.12);
			}

			.error-code {
				font-size: clamp(2.6rem, 6vw, 4.2rem);
				font-weight: 800;
				line-height: 1;
				color: var(--sb-primary);
			}
		</style>
	</head>
	<body>
		<main class="container px-3">
			<section class="error-shell">
				<div class="card error-card">
					<div class="card-body p-4 p-md-5">
						<p class="error-code mb-2">{{ status_code }}</p>
						<h1 class="h3 fw-bold mb-3">{{ title }}</h1>
						<p class="text-secondary mb-4">{{ message }}</p>

						{% if details %}
						<div class="alert alert-light border mb-4" role="alert">
							<small class="fw-semibold d-block mb-1">Detalles:</small>
							<small>{{ details }}</small>
						</div>
						{% endif %}

						<div class="d-flex flex-wrap gap-2">
							<a href="/" class="btn btn-outline-secondary">Ir al inicio</a>
							<a href="javascript:history.back()" class="btn btn-dark">Volver</a>
						</div>
					</div>
				</div>
			</section>
		</main>
	</body>
</html>
