<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Verificación de Seguridad – SoftBakery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fdf6f3,#f7e9e4);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container-2fa{
background:white;
padding:3rem;
border-radius:30px;
width:100%;
max-width:420px;
box-shadow:0 25px 50px rgba(0,0,0,.08);
}

.logo-icon{
font-size:3rem;
color:#9E3B3B;
}

.title{
font-family:'Playfair Display',serif;
color:#9E3B3B;
}

.generated-code{
background:#f8f3f1;
border-radius:15px;
padding:12px;
font-size:1.8rem;
font-weight:500;
letter-spacing:6px;
color:#9E3B3B;
margin-top:15px;
}

.btn-verify{
background:#9E3B3B;
color:white;
border:none;
border-radius:50px;
padding:.7rem;
}

.btn-verify:hover{
background:#862f2f;
}

.code-input{
letter-spacing:6px;
text-align:center;
font-size:1.3rem;
border-radius:50px;
}

.timer{
font-size:.8rem;
color:#777;
margin-top:8px;
}

.small-text{
font-size:.85rem;
}

</style>
</head>

<body>

<div class="container-2fa text-center">

<i class="bi bi-shield-lock-fill logo-icon"></i>

<h3 class="title mt-3">Verificación en dos pasos</h3>

<p class="text-muted small-text mt-2">
Para continuar, ingrese el código temporal generado por el sistema.
</p>

<!-- Código generado -->
<div class="generated-code">
483921
</div>

<p class="small-text text-muted mt-2">
Copie el código mostrado y escríbalo en el campo siguiente.
</p>

<form>

<div class="mb-3 mt-3">

<input
type="text"
class="form-control code-input"
placeholder="000000"
maxlength="6"
>

<div class="timer">
El código expira en 60 segundos
</div>

</div>

<button class="btn btn-verify w-100">
Verificar código
</button>

<div class="mt-3">
<a href="#" class="text-decoration-none small-text" style="color:#9E3B3B;">
Generar nuevo código
</a>
</div>

</form>

</div>

</body>
</html>
