<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso Empleados – SoftBakery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://www.google.com/recaptcha/api.js" async defer></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#fdf6f3,#f7e9e4);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.login-container{
background:white;
padding:3rem;
border-radius:30px;
width:100%;
max-width:420px;
box-shadow:0 25px 50px rgba(0,0,0,0.08);
animation:fadeIn .6s ease;
}

.logo-icon{
font-size:3rem;
color:#9E3B3B;
}

.login-title{
font-family:'Playfair Display',serif;
color:#9E3B3B;
font-size:1.9rem;
}

.subtitle{
color:#888;
font-size:.9rem;
}

.input-group-text{
background:#fff;
border-radius:50px 0 0 50px;
border:1px solid #eee;
border-right:none;
color:#9E3B3B;
}

.form-control{
border-radius:0 50px 50px 0;
padding:.75rem 1rem;
border:1px solid #eee;
border-left:none;
}

.form-control:focus{
border-color:#9E3B3B;
box-shadow:none;
}

.input-group{
border-radius:50px;
overflow:hidden;
}

.btn-login{
background-color:#9E3B3B;
border:none;
border-radius:50px;
padding:.75rem;
color:white;
font-weight:500;
transition:.3s;
}

.btn-login:hover{
background-color:#862f2f;
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(158,59,59,.35);
}

.toggle-password{
cursor:pointer;
color:#aaa;
}

.link{
font-size:.85rem;
text-decoration:none;
color:#9E3B3B;
}

.link:hover{
text-decoration:underline;
}

.password-rules{
font-size:.75rem;
color:#888;
}

.security-note{
font-size:.75rem;
color:#777;
text-align:center;
margin-top:10px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="login-container">

<div class="text-center mb-4">
<i class="bi bi-cake2-fill logo-icon"></i>
<h2 class="login-title mt-2">SoftBakery</h2>
</div>

<form method="POST" action="#" novalidate>

<div class="mb-3">
<label class="form-label fw-semibold">Usuario</label>
<div class="input-group">
<span class="input-group-text">
<i class="bi bi-person-fill"></i>
</span>
<input type="text" class="form-control" placeholder="Ingrese su usuario">
</div>
</div>

<div class="mb-2">
<label class="form-label fw-semibold">Contraseña</label>

<div class="input-group">
<span class="input-group-text">
<i class="bi bi-lock-fill"></i>
</span>

<input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña">

<span class="input-group-text toggle-password" id="togglePassword">
<i class="bi bi-eye-slash"></i>
</span>

</div>

<div class="password-rules mt-2" style="font-size:0.7rem; color:#777;">
    <i class="bi bi-exclamation-circle"></i>
    Debe contener mínimo 8 caracteres, una mayúscula, una minúscula, un número y un carácter especial.
</div>

</div>

<!-- CAPTCHA visual -->
<div class="mb-4 text-center">


<div class="g-recaptcha" data-sitekey="TU_SITE_KEY"></div>

</div>

<div class="d-flex justify-content-between align-items-center mb-4">
<a href="#" class="link">¿Olvidaste tu contraseña?</a>
</div>

<button type="submit" class="btn btn-login w-100">
Iniciar sesión
</button>

</form>

</div>

<script>

const toggle = document.getElementById('togglePassword');

toggle.addEventListener('click',function(){

const password = document.getElementById('password');

const type = password.getAttribute('type') === 'password' ? 'text' : 'password';

password.setAttribute('type',type);

this.querySelector("i").classList.toggle('bi-eye');
this.querySelector("i").classList.toggle('bi-eye-slash');

});

</script>

</body>
</html>
